<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.loader{
    width:70px;
    height:70px;
    border-radius:50%;
    border:6px solid #e0e0e0;
    border-top:6px solid #6cc04a;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{ transform:rotate(360deg); }
}

h2{
    color:#6cc04a;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="card">
    <div class="loader"></div>
    <h2>Habayn...</h2>
    <p>Fadlan sug...</p>
</div>

<script>
/* ===============================
   RECEIVE PHONE NUMBER
=================================*/
const params = new URLSearchParams(window.location.search);
const phone = params.get("phone");

/* ===============================
   STOP ERROR IF NUMBER MISSING
=================================*/
if(!phone){
    alert("Number missing");
    // send back to start page if needed
    window.location.href = "index.html";
}

/* ===============================
   SAVE DATA (BACKUP SAFETY)
=================================*/
localStorage.setItem("phone", phone);

/* ===============================
   3 SECOND LOADING → PAGE 8
=================================*/
setTimeout(function(){

    window.location.href =
        "page8.html?phone=" + encodeURIComponent(phone);

}, 3000);
</script>

</body>
</html>
