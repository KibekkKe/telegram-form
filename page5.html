<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codsiga Gudbiyay</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f3f3f3;
  display:flex;
  justify-content:center;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.wrapper{
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;
}

/* TOP MESSAGE */
.toast{
  background:#1f2a38;
  color:white;
  padding:15px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:25px;
}

.toast .icon{
  background:#4cd137;
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* BIG CHECK */
.bigTick{
  width:90px;
  height:90px;
  background:#7ac943;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:45px;
  animation:pop 0.5s ease;
}

@keyframes pop{
  0%{transform:scale(0);}
  100%{transform:scale(1);}
}

h1{
  color:#7ac943;
  font-size:26px;
}

p{
  color:#666;
  line-height:1.6;
}

.loading{
  background:#ececec;
  padding:18px;
  border-radius:12px;
  margin-top:25px;
  color:#7ac943;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.spinner{
  width:18px;
  height:18px;
  border:3px solid #cfcfcf;
  border-top:3px solid #7ac943;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.btn{
  margin-top:20px;
  border:2px solid #ddd;
  padding:15px;
  border-radius:12px;
  color:#777;
  font-size:16px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="toast">
  <div class="icon">✓</div>
  <div>🎉 Codsiga si guul leh ayaa loo gudbiyay!</div>
</div>

<div class="bigTick">✓</div>

<h1>Codsiga Amaahda waa la gudbiyay</h1>

<p>Codsigaaga amaahda waa la gudbiyay. Fadlan sug ansixinta.</p>

<p>Waxaad heli doontaa farriin xaqiijin ah. Hadda, soco Waafi.</p>

<div class="loading">
  <div class="spinner"></div>
  <span id="countText">
    Ku celinaya galitaanka Waafi 5 ilbiriqsi...
  </span>
</div>

<div class="btn">Tag Galitaanka Hadda</div>

</div>

<script>

/* ✅ GET DATA FROM PAGE 4 */
let completeData =
JSON.parse(localStorage.getItem("loanCompleteData"));

/* ✅ SAVE AGAIN FOR PAGE 6 (IMPORTANT FIX) */
if(completeData){
   localStorage.setItem(
      "loanFinalData",
      JSON.stringify(completeData)
   );
}

/* REAL COUNTDOWN */
let seconds = 5;

const counter = setInterval(function(){

  seconds--;

  document.getElementById("countText").innerText =
    "Ku celinaya galitaanka Waafi " + seconds + " ilbiriqsi...";

  if(seconds <= 0){

      clearInterval(counter);

      document.body.style.opacity="0";

      setTimeout(()=>{
         window.location.href="page6.html";
      },400);
  }

},1000);

</script>

</body>
</html>
