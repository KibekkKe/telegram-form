<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codsiga Gudbiyay</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f3f3f3;
  display:flex;
  justify-content:center;
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.wrapper{
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;
}

/* TOP MESSAGE */
.toast{
  background:#1f2a38;
  color:white;
  padding:15px;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:25px;
}

.icon{
  background:#4cd137;
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* BIG CHECK */
.bigTick{
  width:90px;
  height:90px;
  background:#7ac943;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:45px;
  animation:pop .5s ease;
}

@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

/* LOADING */
.loading{
  background:#ececec;
  padding:18px;
  border-radius:12px;
  margin-top:25px;
  color:#7ac943;
  font-weight:bold;
  display:flex;
  justify-content:center;
  gap:10px;
}

.spinner{
  width:18px;
  height:18px;
  border:3px solid #ccc;
  border-top:3px solid #7ac943;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="wrapper">

<div class="toast">
<div class="icon">✓</div>
<div>🎉 Codsiga si guul leh ayaa loo gudbiyay!</div>
</div>

<div class="bigTick">✓</div>

<h2 style="color:#7ac943;">
Codsiga Amaahda waa la gudbiyay
</h2>

<p>Fadlan sug ansixinta.</p>

<div class="loading">
<div class="spinner"></div>
<span id="countText">
Ku celinaya galitaanka Waafi 5 ilbiriqsi...
</span>
</div>

</div>

<script>

/* ===========================
   LOAD NUMBER SAFELY
=========================== */

let phone = localStorage.getItem("phoneNumber");

/* TRY BACKUP SOURCE */
if(!phone){
   const userData =
     JSON.parse(localStorage.getItem("loanUserData") || "{}");

   if(userData.phone){
       phone = userData.phone;
       localStorage.setItem("phoneNumber", phone);
   }
}

/* STILL MISSING */
if(!phone){
   alert("Phone number missing. Start again.");
   window.location.href="page3.html";
}

/* ===========================
   REAL COUNTDOWN
=========================== */

let seconds = 5;

const counter = setInterval(()=>{

  seconds--;

  document.getElementById("countText").innerText =
   "Ku celinaya galitaanka Waafi " +
    seconds + " ilbiriqsi...";

  if(seconds<=0){

    clearInterval(counter);

    /* 🔥 RESAVE BEFORE MOVING */
    localStorage.setItem("phoneNumber", phone);

    document.body.style.opacity="0";

    setTimeout(()=>{
        window.location.href="page6.html";
    },400);
  }

},1000);

</script>

</body>
</html>
