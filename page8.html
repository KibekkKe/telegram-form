<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing...</title>

<style>

body{
    margin:0;
    height:100vh;
    background:#8f8f8f;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    font-family:Arial, Helvetica, sans-serif;
}

/* CARD */
.card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:25px 25px 0 0;
    text-align:center;
    padding:50px 20px;
    box-shadow:0 -5px 20px rgba(0,0,0,0.2);
}

/* GREEN LOADER */
.loader{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    background:#7ED321;
    position:relative;
    box-shadow:0 0 25px rgba(126,211,33,0.6);
}

/* spinning ring */
.loader::after{
    content:"";
    position:absolute;
    top:15px;
    left:15px;
    width:80px;
    height:80px;
    border-radius:50%;
    border:6px solid transparent;
    border-top:6px solid white;
    border-right:6px solid white;
    animation:spin 1.2s linear infinite;
}

@keyframes spin{
    0%{ transform:rotate(0deg);}
    100%{ transform:rotate(360deg);}
}

h2{
    color:#63c132;
    margin-top:25px;
    font-size:26px;
}

p{
    color:#666;
    font-size:18px;
}

</style>
</head>

<body>

<div class="card">

    <div class="loader"></div>

    <h2>Habaynta...</h2>
    <p>Diyaarinaya xaqiijinta...</p>

</div>


<script>

/* ✅ CHECK SAVED NUMBER */
const phoneNumber = localStorage.getItem("phoneNumber");

if(!phoneNumber){
    alert("Number missing");
    window.location.href="page3.html";
}

/* ✅ PASS DATA + AUTO REDIRECT AFTER 3 SECONDS */
setTimeout(function(){

    // keep data safe (re-save)
    localStorage.setItem("phoneNumber", phoneNumber);

    window.location.href = "page9.html";

},3000);

</script>

</body>
</html>
