<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soo koobidda Codsiga</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:#7ac943;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

/* CARD */
.container{
  max-width:420px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* PROGRESS */
.progress{
  display:flex;
  gap:8px;
  margin-bottom:25px;
}

.bar{
  flex:1;
  height:6px;
  background:#7ac943;
  border-radius:5px;
}

/* INPUTS */
label{
  display:block;
  margin-top:15px;
  margin-bottom:6px;
  font-size:16px;
}

select,input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

/* SUMMARY CARD */
.summary{
  background:#f4f4f4;
  border-left:6px solid #7ac943;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #ddd;
  font-size:17px;
}

.row:last-child{
  border-bottom:none;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:20px;
  font-size:16px;
}

.gray{background:#ddd;}
.green{background:#7ac943;color:white;}

.footer{
  text-align:center;
  color:gray;
  margin:20px;
}

</style>
</head>

<body>

<div class="header">
<div>← Dib u noqo</div>
<div>Waafi ☰</div>
</div>

<div class="container">

<!-- PROGRESS -->
<div class="progress">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<!-- JOB -->
<label>Xaaladda Shaqada</label>

<select id="job">
<option value="Shaqaale">Shaqaale</option>
<option value="Shaqo-qabsi gaar ah">Shaqo-qabsi gaar ah</option>
<option value="Shaqo la'aan">Shaqo la'aan</option>
<option value="Hawl qabsi ka baxay">Hawl qabsi ka baxay</option>
<option value="Arday">Arday</option>
</select>

<!-- INCOME -->
<label>Dakhliga Sanadka ($)</label>
<input type="number" id="income" placeholder="25,000">

<!-- SUMMARY -->
<div class="summary">

<h3>Soo koobidda Codsiga</h3>

<div class="row">
<span>Qaddarka Amaahda:</span>
<span>$1,000</span>
</div>

<div class="row">
<span>Muddada Amaahda:</span>
<span>12 Bilood</span>
</div>

<div class="row">
<span>Ujeedada:</span>
<span>Business</span>
</div>

<div class="row">
<span>Codsade:</span>
<span id="customerName"></span>
</div>

</div>

<button class="btn gray"
onclick="window.location.href='page3.html'">
KA HORE
</button>

<button class="btn green" onclick="goToPage5()">
DIR CODSIGA
</button>

</div>

<div class="footer">
© 2025 Waafi Soomaaliya
</div>

<script>

/* LOAD DATA FROM PAGE 3 */
let userData =
JSON.parse(localStorage.getItem("loanUserData"));

if(userData){
  document.getElementById("customerName").innerText =
    userData.firstName + " " + userData.lastName;
}

/* SEND TO PAGE 5 */
function goToPage5(){

  const job =
  document.getElementById("job").value;

  const income =
  document.getElementById("income").value;

  userData.job = job;
  userData.income = income;

  localStorage.setItem(
    "loanCompleteData",
    JSON.stringify(userData)
  );

  window.location.href = "page5.html";
}

</script>

</body>
</html>
