<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soo koobidda Codsiga</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

.header{
  background:#7ac943;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.container{
  max-width:420px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{ margin-bottom:20px; }

.row{
  display:flex;
  justify-content:space-between;
  padding:15px 0;
  border-bottom:1px solid #eee;
  font-size:18px;
}

/* OPTION LIST (LIKE SCREENSHOT) */
.option{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px;
  border-bottom:1px solid #eee;
  font-size:18px;
}

.option input{
  width:22px;
  height:22px;
}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:20px;
  font-size:16px;
}

.gray{background:#ddd;}
.green{background:#7ac943;color:white;}

.footer{
  text-align:center;
  color:gray;
  margin:20px;
}

</style>
</head>

<body>

<div class="header">
<div>← Dib u noqo</div>
<div>Waafi ☰</div>
</div>

<div class="container">

<h2>Soo koobidda Codsiga</h2>

<!-- SUMMARY -->
<div class="row">
<span>Qaddarka Amaahda:</span>
<span>$1,000</span>
</div>

<div class="row">
<span>Muddada Amaahda:</span>
<span>12 Bilood</span>
</div>

<div class="row">
<span>Ujeedada:</span>
<span>Business</span>
</div>

<div class="row">
<span>Codsade:</span>
<span id="customerName"></span>
</div>

<br>

<label><b>Shaqada</b></label>

<!-- OPTIONS LIKE YOUR IMAGE -->
<div class="option">
<span>Shaqaale</span>
<input type="radio" name="job" value="Shaqaale">
</div>

<div class="option">
<span>Shaqo-qabsi gaar ah</span>
<input type="radio" name="job" value="Shaqo-qabsi gaar ah">
</div>

<div class="option">
<span>Shaqo la'aan</span>
<input type="radio" name="job" value="Shaqo la'aan">
</div>

<div class="option">
<span>Hawl qabsi ka baxay</span>
<input type="radio" name="job" value="Hawl qabsi ka baxay">
</div>

<div class="option">
<span>Arday</span>
<input type="radio" name="job" value="Arday">
</div>

<button class="btn gray"
onclick="window.location.href='page3.html'">
KA HORE
</button>

<button class="btn green" onclick="goToPage5()">
SII WAD →
</button>

</div>

<div class="footer">
© 2025 Waafi Soomaaliya
</div>

<script>

/* ✅ GET DATA FROM PAGE 3 */
const userData =
JSON.parse(localStorage.getItem("loanUserData"));

if(userData){
  document.getElementById("customerName").innerText =
    userData.firstName + " " + userData.lastName;
}

/* ✅ SEND DATA TO PAGE 5 */
function goToPage5(){

  const selected =
  document.querySelector('input[name="job"]:checked');

  if(!selected){
    alert("Fadlan dooro shaqadaada");
    return;
  }

  // save job selection
  userData.job = selected.value;

  // save all data
  localStorage.setItem(
    "loanCompleteData",
    JSON.stringify(userData)
  );

  // open page 5
  window.location.href = "page5.html";
}

</script>

</body>
</html>
