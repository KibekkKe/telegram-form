<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codsiga Amaahda</title>

<style>
body{
font-family: Arial;
background:#f3f3f3;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

h2{
text-align:center;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
background:#7ac943;
border:none;
color:white;
font-size:16px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Codsiga Amaahda</h2>

<form id="loanForm">

<label>Nooca Amaahda</label>
<select name="nooca">
<option>Amaah Shakhsi ah</option>
<option>Amaah Ganacsi</option>
</select>

<label>Qaddarka Amaahda ($)</label>
<input name="lacag" required>

<label>Muddada Amaahda</label>
<select name="muddo">
<option>6 Bilood</option>
<option>12 Bilood</option>
<option>24 Bilood</option>
</select>

<label>Ujeedada Amaahda</label>
<textarea name="ujeedo"></textarea>

<button type="submit">DIR CODSIGA</button>

</form>

</div>

<script>
document.getElementById("loanForm").onsubmit = async (e)=>{
e.preventDefault();

const data = Object.fromEntries(new FormData(e.target));

await fetch("/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("Mahadsanid! Codsigaaga waa la diray.");
};
</script>

</body>
</html>
