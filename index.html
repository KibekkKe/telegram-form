<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Waafi Amaah</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:linear-gradient(to right,#9bdc28,#6bc048);
  color:white;
  padding:18px;
  font-size:24px;
  font-weight:bold;
}

/* MAIN CARD */
.container{
  padding:20px;
}

.card{
  background:white;
  border-radius:15px;
  padding:20px;
  box-shadow:0 0 12px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:gray;
  margin-bottom:20px;
}

/* CALCULATOR */
.calc-box{
  background:#f5f5f5;
  padding:15px;
  border-radius:12px;
}

.label{
  margin-top:15px;
  font-weight:bold;
}

.value{
  float:right;
  color:#6bc048;
  font-weight:bold;
}

input[type=range]{
  width:100%;
}

/* PAYMENT BOX */
.payment{
  background:white;
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  border:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  font-size:20px;
}

.green{
  color:#6bc048;
  font-weight:bold;
}

/* BUTTON */
button{
  width:100%;
  margin-top:20px;
  padding:16px;
  border:none;
  border-radius:10px;
  font-size:18px;
  color:white;
  background:linear-gradient(to right,#9bdc28,#6bc048);
  font-weight:bold;
}

/* FEATURES */
.feature{
  display:flex;
  align-items:center;
  margin-top:20px;
}

.icon{
  font-size:30px;
  margin-right:15px;
}

.small{
  color:gray;
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">Waafi</div>

<div class="container">

<div class="card">

<h2>Hel Amaah Deg Deg ah</h2>
<div class="subtitle">
Ansixid degdeg ah • Qiimo tartan ah • Muddooyin dabacsan
</div>

<div class="calc-box">

<div class="label">
Qaddarka Amaahda
<span class="value" id="amountValue">$1000</span>
</div>

<input type="range" min="100" max="5000" value="1000" id="amount">

<div class="label">
Muddada Amaahda
<span class="value" id="monthsValue">15 bilood</span>
</div>

<input type="range" min="6" max="60" value="15" id="months">

<div class="payment">
<span>Lacagta Bisha</span>
<span class="green" id="monthly">$81.67</span>
</div>

</div>

<button onclick="goNext()">CODSO HADDA</button>

<!-- FEATURES -->
<div class="feature">
<div class="icon">⚡</div>
<div>
<div>Ansixid Degdeg ah</div>
<div class="small">24 saac gudahood</div>
</div>
</div>

<div class="feature">
<div class="icon">💰</div>
<div>
<div>Qiimo Yar</div>
<div class="small">Laga bilaabo 18%</div>
</div>
</div>

<div class="feature">
<div class="icon">🔒</div>
<div>
<div>Amaan ah</div>
<div class="small">Heer banki</div>
</div>
</div>

</div>
</div>

<script>

const amount = document.getElementById("amount");
const months = document.getElementById("months");

const amountValue = document.getElementById("amountValue");
const monthsValue = document.getElementById("monthsValue");
const monthly = document.getElementById("monthly");

function calculate(){

  let loan = amount.value;
  let period = months.value;

  amountValue.innerText = "$" + loan;
  monthsValue.innerText = period + " bilood";

  // simple calculation
  let interest = 0.18;
  let payment = (loan * (1 + interest)) / period;

  monthly.innerText = "$" + payment.toFixed(2);
}

amount.oninput = calculate;
months.oninput = calculate;

calculate();

function goNext(){
  window.location.href = "/form.html";
}

</script>

</body>
</html>
