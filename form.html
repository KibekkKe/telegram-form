<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Codsiga Amaahda</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f3f3f3;
}

/* HEADER */
.header{
  background:#8bd12b;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.header a{
  color:white;
  text-decoration:none;
}

/* CARD */
.card{
  background:white;
  margin:20px;
  padding:25px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:gray;
  margin-bottom:20px;
}

/* STEP BAR */
.steps{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:25px;
}

.step{
  width:60px;
  height:6px;
  background:#ddd;
  border-radius:10px;
}

.active{
  background:#8bd12b;
}

/* INPUTS */

label{
  font-size:14px;
  color:#444;
}

input, select, textarea{
  width:100%;
  padding:14px;
  margin-top:6px;
  margin-bottom:18px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:15px;
}

textarea{
  height:90px;
  resize:none;
}

/* BUTTON */

.btn{
  width:100%;
  background:linear-gradient(90deg,#b6e23a,#7ecb20);
  color:white;
  border:none;
  padding:16px;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
}

/* FOOTER */

.footer{
  text-align:center;
  color:#999;
  font-size:13px;
  margin-bottom:20px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <a href="index.html">← Dib u noqo</a>
  <div>Waafi</div>
  <div>☰</div>
</div>

<!-- CARD -->
<div class="card">

<h2>Codsiga Amaahda</h2>
<div class="subtitle">Tallaabada 1 ee 3</div>

<!-- STEP INDICATOR -->
<div class="steps">
  <div class="step active"></div>
  <div class="step"></div>
  <div class="step"></div>
</div>

<form action="/submit" method="POST">

<label>Nooca Amaahda</label>
<select name="type">
  <option>Amaah Shakhsi ah</option>
</select>

<label>Qaddarka Amaahda ($)</label>
<input type="number" name="amount" value="1050" required>

<label>Muddada Amaahda</label>
<select name="duration">
  <option>60 Bilood</option>
</select>

<label>Ujeedada Amaahda</label>
<textarea name="reason"
placeholder="Maxaad u isticmaali doontaa amaahda?"></textarea>

<button class="btn">
TALLAABADA XIGTA
</button>

</form>

</div>

<div class="footer">
© 2025 Waafi Soomaaliya
</div>

</body>
  </html>
